services:
  api:
    image: vyle1008/fashionweb-api:latest
    container_name: fashionweb-api
    ports:
      - "7239:7239"
    environment:
      ASPNETCORE_URLS: "http://+:7239"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FashionWebDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379, password = ${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "http://localhost:7239"
      Jwt__Audience: "http://localhost:7239"
      RabbitMq__Host: "localhost"
      RabbitMq__Username: "${RABBITMQ_USERNAME}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    pull_policy: always
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fashionshop-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1') || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: fashionshop-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  sql_data:
  redis_data:
